version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: urban_demand
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "analyst", "-d", "urban_demand"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://analyst:localdev@db:5432/urban_demand
      - MODEL_PATH=/app/models/best_model.pkl
      - EXPLAINER_PATH=/app/models/shap_explainer.pkl
      - FEATURE_NAMES_PATH=/app/models/feature_names.pkl
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - DATABASE_URL=postgresql://analyst:localdev@db:5432/urban_demand
    depends_on:
      - api
    restart: on-failure

volumes:
  pgdata:
  mlflow_data:
